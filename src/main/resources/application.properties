# Configuração do banco de dados usando variáveis de ambiente
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=10

# Configurações do Hibernate/JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Configurações de segurança (token) — agora via variável de ambiente, nunca hardcoded
security.token.secret=${JWT_SECRET_COMPANY}
security.token.secret.candidate=${JWT_SECRET_CANDIDATE}

# Porta do servidor
server.port=8080

# Endpoints de monitoramento
# access=unrestricted permite que o Prometheus faça scrape do /actuator/health normalmente
management.endpoint.health.access=unrestricted
management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.health.show-details=when-authorized